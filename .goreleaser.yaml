version: 2

project_name: compose-update

builds:
  - id: compose-update
    main: .
    binary: compose-update
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm
      - arm64
      - 386
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: binary

release:
  prerelease: auto
