name: Build and release compose-update
on:
  push:
    branches:
      - main

env:
  VERSION: ''

jobs:
  build-and-upload:
    name: Build and upload
    runs-on: ubuntu-latest

    strategy:
      matrix:
        os: [linux, windows]
        goarch: [amd64, arm, arm64, 386]  

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        run: |
          version=$(grep -o 'var version = "[^"]*"' main.go | cut -d'"' -f2)
          echo "VERSION=$version" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: '1.23.2'  # Use the Go version that your project requires

      - name: Build
        run: |
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w" -o ${{ github.workspace }}/build/compose-update-${{ matrix.os }}-${{ matrix.goarch }}${{ matrix.os == 'windows' && '.exe' || '' }} main.go
          echo "ASSET=${{ github.workspace }}/build/compose-update-${{ matrix.os }}-${{ matrix.goarch }}${{ matrix.os == 'windows' && '.exe' || '' }}" >> $GITHUB_ENV

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ env.ASSET }}
          tag_name: ${{ env.VERSION }}

  tag-commit:
    name: Tag commit
    runs-on: ubuntu-latest
    needs: build-and-upload

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tag commit
        run: |
          git tag ${{ env.VERSION }}
          git push origin ${{ env.VERSION }}